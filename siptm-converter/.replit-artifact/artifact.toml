kind = "web"
previewPath = "/"
title = "SIPTM Converter"
version = "1.0.0"
id = "artifacts/siptm-converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26107

[services.development]
run = "pnpm --filter @workspace/siptm-converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/siptm-converter", "run", "build" ]
publicDir = "artifacts/siptm-converter/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26107"
BASE_PATH = "/"
